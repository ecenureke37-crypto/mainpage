<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CüzdanCanavarı - Avatarım</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">👾 CüzdanCanavarı</div>
        <nav>
            <a href="index.html">Varlıklarım</a>
            <a href="avatar.html" class="active">Avatarım</a>
            <a href="#">Bilgi Arenası</a>
        </nav>
        <div class="coin-display">🪙 1250 Coin</div>
    </header>

    <main class="container avatar-page-layout">
        
        <section class="avatar-preview-container">
            <div class="card avatar-card">
                <h2>CüzdanCanavarı Lvl. 3</h2>
                
                <div class="avatar-visual">
                    <img src="https://via.placeholder.com/200x250/e0e0e0/333?text=Base+Body" alt="Avatar Body" class="avatar-layer body">
                    </div>

                <div class="avatar-stats">
                    <div class="stat">❤ Can: 80/100</div>
                    <div class="stat">⚡ Enerji: 95/100</div>
                </div>
            </div>
        </section>

        <section class="avatar-shop-container">
            <div class="card shop-card">
                <h2>Özelleştirme Mağazası</h2>
                
                <div class="shop-tabs">
                    <button class="tab-btn active">Saç</button>
                    <button class="tab-btn">Kıyafet</button>
                    <button class="tab-btn">Ayakkabı</button>
                </div>

                <div class="shop-grid">
                    <div class="shop-item">
                        <div class="item-icon">✂️</div>
                        <div class="item-name">Mavi Havalı Saç</div>
                        <button class="btn-buy">🪙 300 Coin</button>
                    </div>
                    <div class="shop-item owned">
                        <div class="item-icon">👕</div>
                        <div class="item-name">Kodcu Tişörtü</div>
                        <button class="btn-buy" disabled>Sahipsin</button>
                    </div>
                    <div class="shop-item">
                        <div class="item-icon">👟</div>
                        <div class="item-name">Hızlı Koşan Ayakkabı</div>
                        <button class="btn-buy">🪙 500 Coin</button>
                    </div>
                </div>
            </div>
        </section>

    </main>

</body>
</html>
